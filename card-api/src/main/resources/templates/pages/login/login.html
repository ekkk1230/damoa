<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="admin-login-body">
    <div class="admin-login-wrap">
        <div class="admin-login-left">
            <div class="logo-box">
                <img th:src="@{/images/loading-logo.png}" alt="DAMOA LOGO" class="admin-logo-img" />
                <p class="logo-text">Card Benefit Management System</p>
            </div>
        </div>

        <div class="admin-login-right">
            <div class="login-form-container">
                <h2 class="login-title">Administrator</h2>
                <p class="login-subtitle">관리자 계정으로 로그인하세요.</p>

                <form th:action="@{/admin/login}" method="post" class="admin-login-form">
                    <div class="input-group">
                        <label for="loginId">ID</label>
                        <input type="text" id="loginId" name="loginId" placeholder="아이디를 입력하세요" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
                    </div>
                    <button type="submit" class="btn-login">LOGIN</button>
                </form>

                <ul class="login-helper">
                    <li><a href="#">아이디 찾기</a></li>
                    <li><span class="divider">|</span></li>
                    <li><a href="#">비밀번호 찾기</a></li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
