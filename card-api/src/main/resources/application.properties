spring.application.name=card-api

# [Database Connection]
# 3307 \uD3EC\uD2B8\uC640 damoa\uB77C\uB294 DB \uC774\uB984\uC744 \uC0AC\uC6A9\uD569\uB2C8\uB2E4.
spring.datasource.url=jdbc:mysql://localhost:3307/damoa?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
# \uB3C4\uCEE4\uC758 MYSQL_ROOT_PASSWORD\uC640 \uB3D9\uC77C\uD558\uAC8C \uC124\uC815
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# [JPA/Hibernate]
# ddl-auto=update: \uAE30\uC874 \uB370\uC774\uD130\uB97C \uBCF4\uC874\uD558\uBA74\uC11C \uD14C\uC774\uBE14 \uAD6C\uC870\uB9CC \uC5C5\uB370\uC774\uD2B8\uD569\uB2C8\uB2E4.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# [Initial Data]
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false
spring.sql.init.continue-on-error=true

