spring.application.name=card-api

# [Database Connection]
# 3307 포트와 damoa라는 DB 이름을 사용합니다.
spring.datasource.url=jdbc:mysql://localhost:3307/damoa?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
# 도커의 MYSQL_ROOT_PASSWORD와 동일하게 설정
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# [JPA/Hibernate]
# ddl-auto=update: 기존 데이터를 보존하면서 테이블 구조만 업데이트합니다.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# [Initial Data]
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.sql.init.continue-on-error=true